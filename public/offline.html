<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're offline — bankOS Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f9fafb; color:#111827; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:40px 32px; max-width:360px; width:100%; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
.icon { font-size:56px; margin-bottom:20px; }
h1 { font-size:20px; font-weight:700; margin-bottom:8px; }
p { font-size:14px; color:#6b7280; line-height:1.6; margin-bottom:24px; }
.btn { display:inline-block; background:#2563eb; color:white; font-size:14px; font-weight:600; padding:12px 28px; border-radius:10px; border:none; cursor:pointer; text-decoration:none; }
.btn:hover { background:#1d4ed8; }
</style>
</head>
<body>
<div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again. Your data is safe and will sync when you reconnect.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
